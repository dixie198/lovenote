<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A note for you 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a0a;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,100,100,0.2);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 60px rgba(200,0,50,0.15);
    }

    .heart {
      font-size: 2.5rem;
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
      margin-bottom: 20px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .from {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.6);
      margin-bottom: 30px;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      line-height: 1.8;
      color: #fff5f5;
      min-height: 80px;
      transition: opacity 0.5s;
    }

    .date {
      margin-top: 30px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: rgba(255,150,150,0.4);
      text-transform: uppercase;
    }

    .new-badge {
      display: none;
      margin-top: 15px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #ff6b6b;
      text-transform: uppercase;
      animation: fadein 1s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .history-btn {
      margin-top: 25px;
      background: none;
      border: 1px solid rgba(255,100,100,0.3);
      border-radius: 20px;
      color: rgba(255,150,150,0.6);
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-btn:hover {
      background: rgba(255,100,100,0.1);
      color: rgba(255,150,150,0.9);
    }

    /* History drawer */
    .drawer-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      animation: fadein 0.3s ease;
    }

    .drawer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      max-height: 75vh;
      background: #1a0a0a;
      border-top: 1px solid rgba(255,100,100,0.2);
      border-radius: 20px 20px 0 0;
      z-index: 11;
      padding: 30px 25px;
      overflow-y: auto;
      animation: slideup 0.3s ease;
    }

    @keyframes slideup {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .drawer h2 {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.6);
      margin-bottom: 25px;
      text-align: center;
    }

    .drawer-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: rgba(255,150,150,0.5);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .note-entry {
      border-bottom: 1px solid rgba(255,100,100,0.1);
      padding: 18px 0;
    }

    .note-entry:last-child { border-bottom: none; }

    .note-entry .entry-date {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.4);
      margin-bottom: 8px;
    }

    .note-entry .entry-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #fff5f5;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <span class="heart">❤️</span>
  <div class="from">A note from Riley</div>
  <div class="message" id="message">Loading...</div>
  <div class="date" id="date"></div>
  <div class="new-badge" id="badge">✨ new message</div>
  <button class="history-btn" onclick="openDrawer()">📖 read all notes</button>
</div>

<!-- History drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer" style="display:none">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <h2>💌 Every note from Riley</h2>
  <div id="history-list"></div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = Math.random() * 2.5 + 0.5;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    starsEl.appendChild(s);
  }

  const API = 'https://lovenote-ndq2.onrender.com';
  let lastMessage = '';

  async function fetchNote() {
    try {
      const res = await fetch(API + '/note');
      const data = await res.json();

      if (data.message !== lastMessage) {
        const el = document.getElementById('message');
        el.style.opacity = '0';
        setTimeout(() => {
          el.textContent = data.message;
          el.style.opacity = '1';
        }, 500);
        lastMessage = data.message;

        if (data.updated) {
          document.getElementById('badge').style.display = 'block';
          setTimeout(() => document.getElementById('badge').style.display = 'none', 5000);
          fetch(API + '/ack', { method: 'POST' });
        }
      }

      const now = new Date();
      document.getElementById('date').textContent = now.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long'
      });

    } catch(e) {
      document.getElementById('message').textContent = 'I love you ❤️';
    }
  }

  async function openDrawer() {
    try {
      const res = await fetch(API + '/history');
      const notes = await res.json();
      const list = document.getElementById('history-list');
      list.innerHTML = '';

      if (notes.length === 0) {
        list.innerHTML = '<p style="color:rgba(255,150,150,0.4);text-align:center;font-size:0.9rem;">No notes yet...</p>';
      } else {
        notes.forEach(n => {
          list.innerHTML += `
            <div class="note-entry">
              <div class="entry-date">${n.date} · ${n.time}</div>
              <div class="entry-msg">${n.message}</div>
            </div>`;
        });
      }
    } catch(e) {}

    document.getElementById('overlay').style.display = 'block';
    document.getElementById('drawer').style.display = 'block';
  }

  function closeDrawer() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('drawer').style.display = 'none';
  }

  fetchNote();
  setInterval(fetchNote, 10000);
</script>
</body>
</html>
