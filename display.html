<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A note for you 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a0a;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,100,100,0.2);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 60px rgba(200,0,50,0.15);
    }

    .heart {
      font-size: 2.5rem;
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
      margin-bottom: 20px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .from {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.6);
      margin-bottom: 30px;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      line-height: 1.8;
      color: #fff5f5;
      min-height: 80px;
      transition: opacity 0.5s;
    }

    .date {
      margin-top: 30px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: rgba(255,150,150,0.4);
      text-transform: uppercase;
    }

    .new-badge {
      display: none;
      margin-top: 15px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #ff6b6b;
      text-transform: uppercase;
      animation: fadein 1s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .calendar-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 2;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,100,100,0.3);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .calendar-btn:hover {
      background: rgba(255,100,100,0.15);
    }

    /* Calendar overlay */
    .cal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a0a0a;
      z-index: 20;
      animation: fadein 0.3s ease;
      overflow-y: auto;
      padding: 40px 25px 60px;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .cal-title {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.7);
    }

    .cal-nav {
      background: none;
      border: 1px solid rgba(255,100,100,0.2);
      border-radius: 8px;
      color: rgba(255,150,150,0.6);
      font-size: 1rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cal-nav:hover {
      background: rgba(255,100,100,0.1);
    }

    .cal-close {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255,150,150,0.5);
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 21;
    }

    .cal-month-title {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #fff5f5;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 20px;
    }

    .cal-day-label {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.3);
      padding: 5px 0;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      cursor: default;
      transition: all 0.2s;
    }

    .cal-day.has-note {
      background: rgba(200,0,50,0.3);
      border: 1px solid rgba(255,100,100,0.5);
      color: #fff5f5;
      cursor: pointer;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 5px rgba(200,0,50,0.3); }
      100% { box-shadow: 0 0 15px rgba(200,0,50,0.7); }
    }

    .cal-day.has-note:hover {
      background: rgba(200,0,50,0.5);
    }

    .cal-day.today {
      border: 1px solid rgba(255,150,150,0.3);
      color: rgba(255,255,255,0.7);
    }

    .cal-day.empty { cursor: default; }

    /* Note popup */
    .note-popup {
      display: none;
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      background: #2a0a0a;
      border-top: 1px solid rgba(255,100,100,0.2);
      border-radius: 20px 20px 0 0;
      padding: 30px 25px 40px;
      z-index: 30;
      animation: slideup 0.3s ease;
    }

    @keyframes slideup {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .note-popup-date {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.4);
      margin-bottom: 15px;
    }

    .note-popup-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.2rem;
      line-height: 1.7;
      color: #fff5f5;
    }

    .note-popup-close {
      position: absolute;
      top: 15px; right: 20px;
      background: none;
      border: none;
      color: rgba(255,150,150,0.4);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .multiple-notes {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .multiple-note-item {
      border-top: 1px solid rgba(255,100,100,0.1);
      padding-top: 15px;
    }

    .multiple-note-time {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: rgba(255,150,150,0.3);
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <span class="heart">❤️</span>
  <div class="from">A note from Riley</div>
  <div class="message" id="message">Loading...</div>
  <div class="date" id="date"></div>
  <div class="new-badge" id="badge">✨ new message</div>
</div>

<button class="calendar-btn" onclick="openCalendar()" title="View all notes">📅</button>

<!-- Calendar overlay -->
<div class="cal-overlay" id="cal-overlay">
  <button class="cal-close" onclick="closeCalendar()">✕</button>
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <div>
      <div class="cal-month-title" id="cal-month-title"></div>
      <div class="cal-title" style="text-align:center;margin-top:4px;">your love diary</div>
    </div>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- Note popup -->
<div class="note-popup" id="note-popup">
  <button class="note-popup-close" onclick="closePopup()">✕</button>
  <div class="note-popup-date" id="popup-date"></div>
  <div id="popup-content"></div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = Math.random() * 2.5 + 0.5;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    starsEl.appendChild(s);
  }

  const API = 'https://lovenote-ndq2.onrender.com';
  let lastMessage = '';
  let allNotes = [];
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();

  async function fetchNote() {
    try {
      const res = await fetch(API + '/note');
      const data = await res.json();

      if (data.message !== lastMessage) {
        const el = document.getElementById('message');
        el.style.opacity = '0';
        setTimeout(() => {
          el.textContent = data.message;
          el.style.opacity = '1';
        }, 500);
        lastMessage = data.message;

        if (data.updated) {
          document.getElementById('badge').style.display = 'block';
          setTimeout(() => document.getElementById('badge').style.display = 'none', 5000);
          fetch(API + '/ack', { method: 'POST' });
        }
      }

      const now = new Date();
      document.getElementById('date').textContent = now.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long'
      });

    } catch(e) {
      document.getElementById('message').textContent = 'I love you ❤️';
    }
  }

  async function openCalendar() {
    try {
      const res = await fetch(API + '/history');
      allNotes = await res.json();
    } catch(e) { allNotes = []; }

    currentMonth = new Date().getMonth();
    currentYear = new Date().getFullYear();
    renderCalendar();
    document.getElementById('cal-overlay').style.display = 'block';
  }

  function closeCalendar() {
    document.getElementById('cal-overlay').style.display = 'none';
    closePopup();
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    const monthNames = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
    document.getElementById('cal-month-title').textContent = 
      monthNames[currentMonth] + ' ' + currentYear;

    // Build a map of date string -> notes
    const noteMap = {};
    allNotes.forEach(n => {
      const key = n.date;
      if (!noteMap[key]) noteMap[key] = [];
      noteMap[key].push(n);
    });

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    // Day labels
    ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
      const label = document.createElement('div');
      label.classList.add('cal-day-label');
      label.textContent = d;
      grid.appendChild(label);
    });

    const firstDay = new Date(currentYear, currentMonth, 1);
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // Convert to Mon=0

    const today = new Date();

    // Empty cells
    for (let i = 0; i < startDow; i++) {
      const empty = document.createElement('div');
      empty.classList.add('cal-day', 'empty');
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dayEl = document.createElement('div');
      dayEl.classList.add('cal-day');
      dayEl.textContent = d;

      const dateObj = new Date(currentYear, currentMonth, d);
      const dateStr = dateObj.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });

      // Check if today
      if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
        dayEl.classList.add('today');
      }

      // Check if has notes
      if (noteMap[dateStr]) {
        dayEl.classList.add('has-note');
        const notes = noteMap[dateStr];
        dayEl.onclick = () => showNotePopup(dateStr, notes);
      }

      grid.appendChild(dayEl);
    }
  }

  function showNotePopup(dateStr, notes) {
    document.getElementById('popup-date').textContent = dateStr;
    const content = document.getElementById('popup-content');

    if (notes.length === 1) {
      content.innerHTML = `<div class="note-popup-msg">${notes[0].message}</div>`;
    } else {
      content.innerHTML = `<div class="multiple-notes">` +
        notes.map(n => `
          <div class="multiple-note-item">
            <div class="multiple-note-time">${n.time}</div>
            <div class="note-popup-msg">${n.message}</div>
          </div>`).join('') +
        `</div>`;
    }

    document.getElementById('note-popup').style.display = 'block';
  }

  function closePopup() {
    document.getElementById('note-popup').style.display = 'none';
  }

  fetchNote();
  setInterval(fetchNote, 10000);
</script>
</body>
</html>
