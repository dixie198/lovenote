<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A note for you 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lato:wght@300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a0a;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.1; }
      100% { opacity: 0.8; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,100,100,0.2);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 60px rgba(200,0,50,0.15);
    }

    .heart {
      font-size: 2.5rem;
      animation: pulse 1.5s ease-in-out infinite;
      display: block;
      margin-bottom: 20px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .from {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,150,150,0.6);
      margin-bottom: 30px;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      line-height: 1.8;
      color: #fff5f5;
      min-height: 80px;
    }

    .date {
      margin-top: 30px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: rgba(255,150,150,0.4);
      text-transform: uppercase;
    }

    .new-badge {
      display: none;
      margin-top: 15px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #ff6b6b;
      text-transform: uppercase;
      animation: fadein 1s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <span class="heart">❤️</span>
  <div class="from">A note from Riley</div>
  <div class="message" id="message">Loading...</div>
  <div class="date" id="date"></div>
  <div class="new-badge" id="badge">✨ new message</div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.classList.add('star');
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = Math.random() * 2.5 + 0.5;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    starsEl.appendChild(s);
  }

  const API = 'https://lovenote-ndq2.onrender.com';
  let lastMessage = '';

  async function fetchNote() {
    try {
      const res = await fetch(API + '/note');
      const data = await res.json();
      
      if (data.message !== lastMessage) {
        lastMessage = data.message;
        document.getElementById('message').textContent = data.message;
        if (data.updated) {
          document.getElementById('badge').style.display = 'block';
          setTimeout(() => document.getElementById('badge').style.display = 'none', 5000);
          fetch(API + '/ack', { method: 'POST' });
        }
      }

      const now = new Date();
      document.getElementById('date').textContent = now.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long'
      });

    } catch(e) {
      document.getElementById('message').textContent = 'I love you ❤️';
    }
  }

  fetchNote();
  setInterval(fetchNote, 60000);
</script>
</body>
</html>
